<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Candidatos</title>
</head>
<body>

<header>
    <h1>🗳️ Sistema de Votación</h1>
    <p>Lista de candidatos disponibles</p>
</header>

<main>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Nombre completo</th>
                <th>Partido</th>
                <th>Propuesta</th>
                <th>Total votos</th>
            </tr>
        </thead>
        <tbody>
            <!-- Muestra los candidatos -->
            <tr th:each="c, stat : ${candidatos}">
                <td th:text="${stat.count}">1</td>
                <td th:text="${c.nombre + ' ' + c.apellido}">Juan Pérez</td>
                <td><span class="partido-badge" th:text="${c.partido}">Partido</span></td>
                <td><p class="propuesta-text" th:text="${c.propuesta}">Propuesta...</p></td>
                <td class="votos" th:text="${c.totalVotos}">0</td>
            </tr>

            <!-- En caso que la lista este vacia -->
            <tr th:if="${#lists.isEmpty(candidatos)}">
                <td colspan="5" class="empty-msg">Aun no hay candidatos registrados.</td>
            </tr>
        </tbody>
    </table>
</main>

</body>
</html>
