<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Iniciar Sesión</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0d2240, #1a3c6e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 1.4rem;
            color: #1a3c6e;
        }

        .logo p {
            font-size: 0.82rem;
            color: #888;
            margin-top: 4px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
        }

        input:focus {
            outline: none;
            border-color: #1a3c6e;
        }

        .btn {
            width: 100%;
            padding: 0.85rem;
            background: #1a3c6e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            background: #0d2240;
        }

        .error {
            background: #fde8e8;
            color: #c0392b;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <h1>⚙️ Panel Administrativo</h1>
            <p>Acceso exclusivo para administradores</p>
        </div>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <form method="post" th:action="@{/admin/login}">
            <label>Usuario</label>
            <input type="text" name="usuario" placeholder="Ingresa tu usuario" required />
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="••••••••" required />
            <button type="submit" class="btn">Ingresar</button>
        </form>
    </div>
</body>

</html>
