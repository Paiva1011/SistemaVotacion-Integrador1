spring.application.name=sistema-votacion

# Conexión MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_votacion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Abc1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate crea las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
